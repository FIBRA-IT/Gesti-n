<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorkOS Fibra Inn | Enterprise</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg-board: #FFFFFF; --text-main: #323338; --text-gray: #676879;
      --border-color: #D0D4E4; --border-light: #E6E9EF;
      --monday-blue: #0073EA; --sidebar-bg: #1A1F36;
      --stat-listo: #00C875; --stat-curso: #FDAB3D; --stat-estancado: #E2445C; --stat-gris: #C4C4C4;
      --prio-critica: #333333; --prio-alta: #E2445C; --prio-media: #A25DDC; --prio-baja: #579BFC;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { display: flex; height: 100vh; background-color: var(--bg-board); color: var(--text-main); overflow: hidden; }
    
    .panel-secundario { width: 260px; background: #F7F8FA; border-right: 1px solid var(--border-color); padding: 2rem 1.2rem; display: flex; flex-direction: column; }
    .panel-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 2.5rem; display: flex; align-items: center; gap: 10px; color: var(--sidebar-bg); }
    .nav-item { padding: 0.8rem 1rem; border-radius: 8px; font-size: 0.95rem; font-weight: 500; cursor: pointer; color: var(--text-main); margin-bottom: 0.5rem; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
    .nav-item.active { background: #E4F1FF; color: var(--monday-blue); font-weight: 700; border-left: 4px solid var(--monday-blue); }
    .nav-item:hover:not(.active) { background: #EAECEF; }

    .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 2rem 3rem; }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid var(--border-light); padding-bottom: 1rem; }
    
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; position: sticky; top: 0; background: white; z-index: 5; padding: 10px 0; }
    .btn-monday { background: var(--monday-blue); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 6px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 6px rgba(0, 115, 234, 0.2); }
    .btn-monday:hover { background: var(--monday-hover); transform: translateY(-1px); }
    .select-filtro { padding: 0.6rem; border: 1px solid var(--border-color); border-radius: 6px; outline: none; min-width: 240px; font-weight: 600; color: var(--text-main); }

    .monday-group { margin-bottom: 2rem; border: 1px solid var(--border-color); border-radius: 8px; overflow-x: auto; }
    .group-header { padding: 0.8rem 1.2rem; font-size: 1.1rem; font-weight: 600; color: var(--monday-blue); background: white; border-bottom: 1px solid var(--border-color); }
    .monday-table { width: 100%; border-collapse: collapse; min-width: 1000px; }
    .monday-table th { padding: 0.8rem; border-bottom: 1px solid var(--border-color); border-right: 1px solid var(--border-light); font-weight: 500; color: var(--text-gray); font-size: 0.8rem; text-align: center; background: #FAFBFC; text-transform: uppercase; }
    .monday-table td { border-bottom: 1px solid var(--border-light); border-right: 1px solid var(--border-light); text-align: center; font-size: 0.9rem; height: 60px; padding: 0; }
    
    .cell-tarea { text-align: left !important; padding: 0.5rem 1rem !important; border-left: 6px solid var(--monday-blue); width: 300px; }
    .tarea-titulo { font-weight: 600; color: var(--text-main); font-size: 0.95rem; }
    .tarea-desc { font-size: 0.75rem; color: var(--text-gray); margin-top: 4px; font-style: italic; }
    
    .monday-select { appearance: none; width: 100%; height: 100%; border: none; color: white; font-weight: 600; text-align: center; text-align-last: center; cursor: pointer; outline: none; }
    .monday-select:hover { filter: brightness(0.9); }

    /* Gráficas Impactantes */
    .dashboard-view { display: none; grid-template-columns: 1fr 1fr; gap: 2rem; padding: 1rem 0; }
    .chart-box { background: white; padding: 2rem; border-radius: 16px; border: 1px solid var(--border-color); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); display: flex; flex-direction: column; align-items: center; }
    .chart-box h3 { margin-bottom: 2rem; color: var(--text-main); font-weight: 700; width: 100%; text-align: left; }
    .canvas-container { position: relative; width: 100%; height: 300px; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; place-items: center; z-index: 100; backdrop-filter: blur(4px); }
    .modal-overlay.active { display: grid; }
    .modal { background: white; width: 100%; max-width: 600px; border-radius: 12px; padding: 2.5rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
    .form-group { margin-bottom: 1.2rem; display: flex; flex-direction: column; gap: 0.4rem; }
    label { font-size: 0.8rem; font-weight: 700; color: var(--text-main); text-transform: uppercase; }
    input, select, textarea { padding: 0.8rem; border: 2px solid var(--border-light); border-radius: 8px; font-size: 0.95rem; outline: none; transition: 0.2s; }
    input:focus, select:focus, textarea:focus { border-color: var(--monday-blue); }

    .loader-wrap { position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 200; display: none; justify-content: center; align-items: center; flex-direction: column; gap: 15px; }
    .spinner { width: 50px; height: 50px; border: 5px solid var(--border-light); border-top-color: var(--monday-blue); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <aside class="panel-secundario">
    <div class="panel-title">Fibra Inn WorkOS</div>
    <div class="nav-item active" id="nav-tablero" onclick="cambiarVista('tabla')">📋 Tablero Operativo</div>
    <div class="nav-item" id="nav-graficas" onclick="cambiarVista('graficas')">📈 Analíticas de Control</div>
  </aside>

  <div class="loader-wrap" id="loader"><div class="spinner"></div><div id="loader-text" style="font-weight: 700;">PROCESANDO...</div></div>

  <main class="main-wrapper">
    <div class="header-top">
      <h1 class="board-title">Control de Requerimientos</h1>
      <div style="background: #1A1F36; color: white; padding: 8px 18px; border-radius: 30px; font-size: 0.8rem; font-weight: 700; letter-spacing: 1px;">CORPORATIVO</div>
    </div>

    <div class="toolbar">
      <button class="btn-monday" onclick="abrirModal()">+ NUEVA TAREA</button>
      <select id="filtroDepto" class="select-filtro" onchange="aplicarFiltro()">
        <option value="Todos">TODOS LOS DEPARTAMENTOS</option>
        <option value="Mantenimiento">Mantenimiento</option>
        <option value="Jurídico">Jurídico</option>
        <option value="Ama de llaves">Ama de llaves</option>
        <option value="Sistemas">Sistemas</option>
        <option value="Compras">Compras</option>
        <option value="Operaciones">Operaciones</option>
      </select>
    </div>

    <div id="vista-tabla">
      <div class="monday-group">
        <div class="group-header">▼ GESTIÓN DE ACTIVIDADES</div>
        <table class="monday-table">
          <thead>
            <tr>
              <th style="width:40px;"></th>
              <th>Tarea / Requerimiento</th>
              <th style="width:140px;">Responsable</th>
              <th style="width:140px;">Estatus</th>
              <th style="width:120px;">Prioridad</th>
              <th style="width:120px;">F. Inicio</th>
              <th style="width:120px;">F. Final</th>
            </tr>
          </thead>
          <tbody id="body-tabla"></tbody>
        </table>
      </div>
    </div>

    <div class="dashboard-view" id="vista-graficas">
      <div class="chart-box"><h3>Estatus de la Operación</h3><div class="canvas-container"><canvas id="statusChart"></canvas></div></div>
      <div class="chart-box"><h3>Demanda por Departamento</h3><div class="canvas-container"><canvas id="deptChart"></canvas></div></div>
    </div>
  </main>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h2 style="margin-bottom: 2rem; font-weight: 700;">Nuevo Registro Operativo</h2>
      <form id="formTicket" onsubmit="guardarTicket(event)">
        <div class="form-group"><label>Nombre de la tarea</label><input type="text" id="inpTarea" required placeholder="Ej. Reparación de aire acondicionado"></div>
        <div class="form-group"><label>Descripción Detallada</label><textarea id="inpDesc" required placeholder="Escribe aquí los detalles técnicos..."></textarea></div>
        
        <div style="display: flex; gap: 1rem;">
          <div class="form-group" style="flex: 1;"><label>Departamento</label>
            <select id="inpDepto" required>
              <option value="Mantenimiento">Mantenimiento</option>
              <option value="Jurídico">Jurídico</option>
              <option value="Ama de llaves">Ama de llaves</option>
              <option value="Sistemas">Sistemas</option>
              <option value="Compras">Compras</option>
            </select>
          </div>
          <div class="form-group" style="flex: 1;"><label>Prioridad</label>
            <select id="inpPrio" required><option value="Baja">Baja</option><option value="Media">Media</option><option value="Alta">Alta</option><option value="Crítica">Crítica</option></select>
          </div>
        </div>

        <div style="display: flex; gap: 1rem;">
          <div class="form-group" style="flex: 1;"><label>Fecha de Inicio</label><input type="date" id="inpFechaInicio" required></div>
          <div class="form-group" style="flex: 1;"><label>Fecha de Finalización</label><input type="date" id="inpFechaFin" required></div>
        </div>

        <div class="form-group"><label>Asignado a (Escritura libre)</label><input type="text" id="inpResp" required placeholder="Nombre de la persona o puesto"></div>
        
        <div style="display: flex; gap: 10px; margin-top: 1.5rem;">
          <button type="button" style="flex:1; padding: 0.8rem; cursor:pointer; border:1px solid #ddd; border-radius:8px;" onclick="cerrarModal()">CANCELAR</button>
          <button type="submit" class="btn-monday" style="flex:2;">CREAR REGISTRO</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // 🚨 REEMPLAZA ESTA URL CON TU NUEVA IMPLEMENTACIÓN 🚨
    const API_URL = "https://script.google.com/macros/s/AKfycbzDOlrGBX2SwWISncNGzsQ8BKcLpIkXYM9Ytdk51ecJg7R9HxJvoYeebKB6mIeOLuSb/exec";

    let datosGlobales = [];
    let chartEstatus, chartDepto;

    document.addEventListener('DOMContentLoaded', cargarDatos);

    function cambiarVista(vista) {
      document.getElementById('nav-tablero').classList.remove('active');
      document.getElementById('nav-graficas').classList.remove('active');
      if(vista === 'tabla') {
        document.getElementById('nav-tablero').classList.add('active');
        document.getElementById('vista-tabla').style.display = 'block';
        document.getElementById('vista-graficas').style.display = 'none';
      } else {
        document.getElementById('nav-graficas').classList.add('active');
        document.getElementById('vista-tabla').style.display = 'none';
        document.getElementById('vista-graficas').style.display = 'grid';
        actualizarGraficas(datosGlobales);
      }
    }

    function abrirModal() { document.getElementById('modal').classList.add('active'); }
    function cerrarModal() { document.getElementById('modal').classList.remove('active'); document.getElementById('formTicket').reset(); }
    function mostrarCarga(mostrar, texto="PROCESANDO...") { 
      document.getElementById('loader-text').innerText = texto;
      document.getElementById('loader').style.display = mostrar ? 'flex' : 'none'; 
    }

    async function cargarDatos() {
      mostrarCarga(true, "SINCRONIZANDO...");
      try {
        const res = await fetch(API_URL);
        const json = await res.json();
        if(json.exito) { datosGlobales = json.datos; aplicarFiltro(); }
      } catch (e) { console.error(e); }
      mostrarCarga(false);
    }

    function aplicarFiltro() {
      const depto = document.getElementById('filtroDepto').value;
      const filtrados = depto === 'Todos' ? datosGlobales : datosGlobales.filter(d => d.departamento === depto);
      dibujarTabla(filtrados);
    }

    function getColorStatus(s) { return s==='Listo'?'var(--stat-listo)':(s==='En curso'?'var(--stat-curso)':(s==='Estancado'?'var(--stat-estancado)':'var(--stat-gris)')); }
    function getColorPrio(p) { return p==='Crítica'?'var(--prio-critica)':(p==='Alta'?'var(--prio-alta)':(p==='Media'?'var(--prio-media)':'var(--prio-baja)')); }

    function dibujarTabla(datos) {
      const tbody = document.getElementById('body-tabla');
      tbody.innerHTML = '';
      
      datos.forEach(d => {
        const bgStat = getColorStatus(d.estatus);
        const bgPrio = getColorPrio(d.prioridad);
        
        tbody.innerHTML += `
          <tr>
            <td style="background: #F5F6F8;"></td>
            <td class="cell-tarea">
              <div class="tarea-titulo">${d.tarea}</div>
              <div class="tarea-desc">${d.descripcion || 'Sin detalles'}</div>
            </td>
            <td><span style="font-weight:600; font-size:0.8rem;">${d.responsable}</span></td>
            <td style="background-color: ${bgStat};">
              <select class="monday-select" style="background: transparent; color: ${bgStat==='var(--stat-gris)'?'#333':'#fff'};" onchange="actualizarDato('${d.id}', 'Estatus', this.value)">
                <option value="Por hacer" ${d.estatus==='Por hacer'?'selected':''}>Por hacer</option>
                <option value="En curso" ${d.estatus==='En curso'?'selected':''}>En curso</option>
                <option value="Estancado" ${d.estatus==='Estancado'?'selected':''}>Estancado</option>
                <option value="Listo" ${d.estatus==='Listo'?'selected':''}>Listo</option>
              </select>
            </td>
            <td style="background-color: ${bgPrio};">
              <select class="monday-select" style="background: transparent;" onchange="actualizarDato('${d.id}', 'Prioridad', this.value)">
                <option value="Baja" ${d.prioridad==='Baja'?'selected':''}>Baja</option>
                <option value="Media" ${d.prioridad==='Media'?'selected':''}>Media</option>
                <option value="Alta" ${d.prioridad==='Alta'?'selected':''}>Alta</option>
                <option value="Crítica" ${d.prioridad==='Crítica'?'selected':''}>Crítica</option>
              </select>
            </td>
            <td style="font-size:0.75rem; color:#666;">${d.fechaInicio}</td>
            <td style="font-size:0.75rem; color:#666; font-weight:700;">${d.fechaFin}</td>
          </tr>
        `;
      });
    }

    async function guardarTicket(e) {
      e.preventDefault();
      cerrarModal();
      mostrarCarga(true, "GUARDANDO...");
      
      const payload = {
        accion: "crear",
        item: {
          tarea: document.getElementById('inpTarea').value,
          descripcion: document.getElementById('inpDesc').value, // Arreglado
          departamento: document.getElementById('inpDepto').value,
          prioridad: document.getElementById('inpPrio').value,
          responsable: document.getElementById('inpResp').value,
          fechaInicio: document.getElementById('inpFechaInicio').value, // Nuevo
          fechaFin: document.getElementById('inpFechaFin').value // Nuevo
        }
      };

      try {
        await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) });
        setTimeout(cargarDatos, 1200);
      } catch(e) { alert("Error de servidor."); mostrarCarga(false); }
    }

    async function actualizarDato(id, campo, valor) {
      mostrarCarga(true, "ACTUALIZANDO...");
      try {
        await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({accion: "actualizar", id: id, campo: campo, valor: valor}) });
        setTimeout(cargarDatos, 1000);
      } catch(e) { alert("Error."); mostrarCarga(false); }
    }

    function actualizarGraficas(datos) {
      let hacer = 0, curso = 0, estancado = 0, listo = 0;
      let deptos = { "Mantenimiento":0, "Jurídico":0, "Ama de llaves":0, "Sistemas":0, "Compras":0, "Operaciones":0 };
      datos.forEach(d => {
        if(d.estatus==='Listo') listo++; else if(d.estatus==='En curso') curso++; else if(d.estatus==='Estancado') estancado++; else hacer++;
        if(deptos[d.departamento]!==undefined) deptos[d.departamento]++;
      });

      const ctxStat = document.getElementById('statusChart').getContext('2d');
      if(chartEstatus) chartEstatus.destroy();
      chartEstatus = new Chart(ctxStat, { 
        type: 'doughnut', 
        data: { labels: ['Por hacer', 'En curso', 'Estancado', 'Listo'], datasets: [{ data: [hacer, curso, estancado, listo], backgroundColor: ['#C4C4C4', '#FDAB3D', '#E2445C', '#00C875'], borderWidth: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { position: 'bottom' } } }
      });

      const ctxDept = document.getElementById('deptChart').getContext('2d');
      if(chartDepto) chartDepto.destroy();
      chartDepto = new Chart(ctxDept, { 
        type: 'bar', 
        data: { labels: Object.keys(deptos), datasets: [{ label: 'Tareas por Área', data: Object.values(deptos), backgroundColor: '#0073EA', borderRadius: 8 }] }, 
        options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, grid: { display: false } }, x: { grid: { display: false } } } } 
      });
    }
  </script>
</body>
</html>
