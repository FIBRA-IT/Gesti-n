<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorkOS Fibra Inn | Enterprise</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #FFFFFF; --text: #323338; --monday-blue: #0073EA; --border: #D0D4E4;
      --stat-listo: #00C875; --stat-curso: #FDAB3D; --stat-estancado: #E2445C; --stat-gris: #C4C4C4;
      --prio-alta: #E2445C; --prio-media: #A25DDC; --prio-baja: #579BFC;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { display: flex; height: 100vh; background: #F5F6F8; overflow: hidden; }
    
    .sidebar { width: 260px; background: #F7F8FA; border-right: 1px solid var(--border); padding: 2rem 1.2rem; display: flex; flex-direction: column; }
    .nav-item { padding: 0.8rem 1rem; border-radius: 8px; margin-bottom: 0.5rem; cursor: pointer; color: var(--text); font-weight: 500; transition: 0.2s; }
    .nav-item.active { background: #E4F1FF; color: var(--monday-blue); font-weight: 700; border-left: 4px solid var(--monday-blue); }

    .main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; background: white; padding: 2rem 3rem; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid #EEE; padding-bottom: 1rem; }
    
    .toolbar { display: flex; justify-content: space-between; margin-bottom: 1.5rem; position: sticky; top: 0; background: white; z-index: 10; padding: 10px 0; }
    .btn-create { background: var(--monday-blue); color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 4px; font-weight: 600; cursor: pointer; }
    .select-filtro { padding: 0.6rem; border: 1px solid var(--border); border-radius: 4px; min-width: 220px; }

    /* TABLA MONDAY */
    .monday-table { width: 100%; border-collapse: collapse; table-layout: fixed; margin-bottom: 2rem; border: 1px solid var(--border); }
    .monday-table th { padding: 0.8rem; background: #FAFBFC; font-size: 0.8rem; color: #676879; text-transform: uppercase; border-bottom: 1px solid var(--border); border-right: 1px solid #EEE; }
    .monday-table td { height: 65px; border-bottom: 1px solid #EEE; border-right: 1px solid #EEE; text-align: center; vertical-align: middle; }
    
    .cell-task { text-align: left !important; padding-left: 1rem !important; border-left: 6px solid var(--monday-blue); width: 350px; }
    .task-title { font-weight: 600; font-size: 0.95rem; color: #323338; }
    .task-desc { font-size: 0.75rem; color: #676879; margin-top: 4px; }
    
    .monday-select { appearance: none; width: 100%; height: 100%; border: none; color: white; font-weight: 600; text-align: center; text-align-last: center; cursor: pointer; outline: none; }

    /* Gráficas Pro */
    .dashboard-view { display: none; grid-template-columns: 1fr 1fr; gap: 2rem; }
    .chart-box { background: #FFFFFF; padding: 2rem; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    .canvas-container { height: 350px; width: 100%; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; place-items: center; z-index: 100; backdrop-filter: blur(4px); }
    .modal-overlay.active { display: grid; }
    .modal { background: white; width: 600px; border-radius: 12px; padding: 2rem; }
    .form-group { margin-bottom: 1rem; display: flex; flex-direction: column; gap: 5px; }
    label { font-size: 0.8rem; font-weight: 700; color: #323338; }
    input, select, textarea { padding: 0.8rem; border: 1px solid var(--border); border-radius: 6px; font-size: 0.9rem; }
    textarea { height: 80px; resize: none; }

    .loader { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200; font-weight: 700; gap: 10px; }
    .spinner { width: 40px; height: 40px; border: 4px solid #DDD; border-top-color: var(--monday-blue); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div style="font-size: 1.5rem; font-weight: 800; margin-bottom: 2rem; color: #1A1F36;">FI WorkOS</div>
    <div class="nav-item active" id="nav-tab" onclick="cambiarVista('tabla')">📋 Tablero General</div>
    <div class="nav-item" id="nav-chart" onclick="cambiarVista('graficas')">📈 Analíticas Pro</div>
  </aside>

  <div class="loader" id="loader"><div class="spinner"></div>SINCRONIZANDO...</div>

  <main class="main">
    <div class="header">
      <h1 style="font-weight: 500;">Requerimientos Corporativos</h1>
      <div style="background: #1A1F36; color: white; padding: 8px 18px; border-radius: 30px; font-size: 0.8rem; font-weight: 700;">CORPORATIVO</div>
    </div>

    <div class="toolbar">
      <button class="btn-create" onclick="abrirModal()">+ NUEVA TAREA</button>
      <select id="filtroDepto" class="select-filtro" onchange="aplicarFiltro()">
        <option value="Todos">Todas las Áreas</option>
        <option value="Mantenimiento">Mantenimiento</option>
        <option value="Jurídico">Jurídico</option>
        <option value="Ama de llaves">Ama de llaves</option>
        <option value="Sistemas">Sistemas</option>
        <option value="Compras">Compras</option>
      </select>
    </div>

    <div id="view-tabla">
      <table class="monday-table">
        <thead>
          <tr>
            <th style="width:40px;"></th>
            <th>Tarea y Descripción</th>
            <th style="width:150px;">Responsable</th>
            <th style="width:130px;">Estatus</th>
            <th style="width:120px;">Prioridad</th>
            <th style="width:120px;">Inicio</th>
            <th style="width:120px;">Vence</th>
          </tr>
        </thead>
        <tbody id="tabla-body"></tbody>
      </table>
    </div>

    <div class="dashboard-view" id="view-graficas">
      <div class="chart-box"><h3>Estado de Tareas</h3><div class="canvas-container"><canvas id="statusChart"></canvas></div></div>
      <div class="chart-box"><h3>Demanda por Área</h3><div class="canvas-container"><canvas id="deptChart"></canvas></div></div>
    </div>
  </main>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h2 style="margin-bottom: 1.5rem;">Nuevo Registro</h2>
      <form id="formTicket" onsubmit="guardar(event)">
        <div class="form-group"><label>Tarea</label><input type="text" id="inpTarea" required></div>
        <div class="form-group"><label>Descripción Detallada</label><textarea id="inpDesc" required></textarea></div>
        <div style="display: flex; gap: 1rem;">
          <div class="form-group" style="flex: 1;"><label>Área</label><select id="inpDepto"><option value="Mantenimiento">Mantenimiento</option><option value="Jurídico">Jurídico</option><option value="Ama de llaves">Ama de llaves</option><option value="Sistemas">Sistemas</option><option value="Compras">Compras</option></select></div>
          <div class="form-group" style="flex: 1;"><label>Prioridad</label><select id="inpPrio"><option value="Baja">Baja</option><option value="Media">Media</option><option value="Alta">Alta</option><option value="Crítica">Crítica</option></select></div>
        </div>
        <div style="display: flex; gap: 1rem;">
          <div class="form-group" style="flex: 1;"><label>F. Inicio</label><input type="date" id="inpFInicio" required></div>
          <div class="form-group" style="flex: 1;"><label>F. Final</label><input type="date" id="inpFFin" required></div>
        </div>
        <div class="form-group"><label>Asignado a (Escritura Libre)</label><input type="text" id="inpResp" required></div>
        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
          <button type="button" style="flex: 1; padding: 0.8rem;" onclick="cerrarModal()">CANCELAR</button>
          <button type="submit" class="btn-create" style="flex: 1;">GUARDAR</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzDOlrGBX2SwWISncNGzsQ8BKcLpIkXYM9Ytdk51ecJg7R9HxJvoYeebKB6mIeOLuSb/exec";
    let datos = [];
    let chart1, chart2;

    document.addEventListener('DOMContentLoaded', load);

    function load() {
      document.getElementById('loader').style.display = 'flex';
      fetch(API_URL).then(r => r.json()).then(res => {
        datos = res.datos;
        aplicarFiltro();
        document.getElementById('loader').style.display = 'none';
      });
    }

    function cambiarVista(v) {
      document.getElementById('nav-tab').classList.toggle('active', v==='tabla');
      document.getElementById('nav-chart').classList.toggle('active', v==='graficas');
      document.getElementById('view-tabla').style.display = v==='tabla'?'block':'none';
      document.getElementById('view-graficas').style.display = v==='graficas'?'grid':'none';
      if(v==='graficas') renderCharts();
    }

    function aplicarFiltro() {
      const depto = document.getElementById('filtroDepto').value;
      const filtrados = depto === 'Todos' ? datos : datos.filter(d => d.departamento === depto);
      renderTable(filtrados);
    }

    function renderTable(arr) {
      const body = document.getElementById('tabla-body');
      body.innerHTML = '';
      arr.forEach(d => {
        const cStat = d.estatus==='Listo'?'var(--stat-listo)':(d.estatus==='En curso'?'var(--stat-curso)':(d.estatus==='Estancado'?'var(--stat-estancado)':'var(--stat-gris)'));
        const cPrio = d.prioridad==='Crítica'?'#333':(d.prioridad==='Alta'?'var(--prio-alta)':(d.prioridad==='Media'?'var(--prio-media)':'var(--prio-baja)'));
        
        body.innerHTML += `
          <tr>
            <td style="background: #F5F6F8;"></td>
            <td class="cell-task">
              <div class="task-title">${d.tarea}</div>
              <div class="task-desc">${d.descripcion || 'Sin detalles adicionales'}</div>
            </td>
            <td><span style="font-weight:700;">${d.responsable}</span></td>
            <td style="background:${cStat};">
              <select class="monday-select" onchange="update('${d.id}','Estatus',this.value)" style="color:${cStat==='var(--stat-gris)'?'#333':'#FFF'}">
                <option value="Por hacer" ${d.estatus==='Por hacer'?'selected':''}>Por hacer</option>
                <option value="En curso" ${d.estatus==='En curso'?'selected':''}>En curso</option>
                <option value="Estancado" ${d.estatus==='Estancado'?'selected':''}>Estancado</option>
                <option value="Listo" ${d.estatus==='Listo'?'selected':''}>Listo</option>
              </select>
            </td>
            <td style="background:${cPrio};">
              <select class="monday-select" onchange="update('${d.id}','Prioridad',this.value)">
                <option value="Baja" ${d.prioridad==='Baja'?'selected':''}>Baja</option>
                <option value="Media" ${d.prioridad==='Media'?'selected':''}>Media</option>
                <option value="Alta" ${d.prioridad==='Alta'?'selected':''}>Alta</option>
                <option value="Crítica" ${d.prioridad==='Crítica'?'selected':''}>Crítica</option>
              </select>
            </td>
            <td style="color:#666; font-size:0.8rem;">${d.fechaInicio}</td>
            <td style="color:#666; font-size:0.8rem; font-weight:700;">${d.fechaFin}</td>
          </tr>
        `;
      });
    }

    async function guardar(e) {
      e.preventDefault();
      cerrarModal();
      document.getElementById('loader').style.display = 'flex';
      
      const item = {
        tarea: document.getElementById('inpTarea').value,
        descripcion: document.getElementById('inpDesc').value, // ¡CORREGIDO!
        departamento: document.getElementById('inpDepto').value,
        prioridad: document.getElementById('inpPrio').value,
        responsable: document.getElementById('inpResp').value,
        fechaInicio: document.getElementById('inpFInicio').value, // ¡NUEVO!
        fechaFin: document.getElementById('inpFFin').value // ¡NUEVO!
      };

      await fetch(API_URL, { method: 'POST', body: JSON.stringify({accion:"crear", item: item}) });
      load();
    }

    async function update(id, campo, valor) {
      document.getElementById('loader').style.display = 'flex';
      await fetch(API_URL, { method: 'POST', body: JSON.stringify({accion:"actualizar", id:id, campo:campo, valor:valor}) });
      load();
    }

    function renderCharts() {
      const stats = { listo:0, curso:0, estancado:0, hacer:0 };
      const deptos = {};
      datos.forEach(d => {
        if(d.estatus==='Listo') stats.listo++; else if(d.estatus==='En curso') stats.curso++; else if(d.estatus==='Estancado') stats.estancado++; else stats.hacer++;
        deptos[d.departamento] = (deptos[d.departamento] || 0) + 1;
      });

      if(chart1) chart1.destroy();
      chart1 = new Chart(document.getElementById('statusChart'), {
        type: 'doughnut',
        data: { labels: ['Listo', 'En curso', 'Estancado', 'Pendiente'], datasets: [{ data: [stats.listo, stats.curso, stats.estancado, stats.hacer], backgroundColor: ['#00C875','#FDAB3D','#E2445C','#C4C4C4'], borderWidth: 0 }] },
        options: { maintainAspectRatio: false, cutout: '75%' }
      });

      if(chart2) chart2.destroy();
      chart2 = new Chart(document.getElementById('deptChart'), {
        type: 'bar',
        data: { labels: Object.keys(deptos), datasets: [{ label: 'Tareas', data: Object.values(deptos), backgroundColor: '#0073EA', borderRadius: 8 }] },
        options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: {stepSize: 1} } } }
      });
    }

    function abrirModal() { document.getElementById('modal').classList.add('active'); }
    function cerrarModal() { document.getElementById('modal').classList.remove('active'); document.getElementById('formTicket').reset(); }
  </script>
</body>
</html>
