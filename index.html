<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WorkOS Fibra Inn | Enterprise</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #F1F5F9; --text: #1E293B; --monday-blue: #0073EA; --border: #E2E8F0;
      --stat-listo: #00C875; --stat-curso: #FDAB3D; --stat-estancado: #E2445C; --stat-gris: #94A3B8;
      --prio-alta: #EF4444; --prio-media: #F59E0B; --prio-baja: #3B82F6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { display: flex; height: 100vh; background: var(--bg); overflow: hidden; color: var(--text); }
    
    /* Sidebar */
    .sidebar { width: 260px; background: #0F172A; padding: 2rem 1.2rem; display: flex; flex-direction: column; color: white; transition: transform 0.3s ease; z-index: 1000; flex-shrink: 0; }
    .nav-item { padding: 0.9rem 1rem; border-radius: 8px; margin-bottom: 0.5rem; cursor: pointer; font-weight: 600; color: #94A3B8; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
    .nav-item.active { background: var(--monday-blue); color: white; }
    .sidebar-close { display: none; font-size: 1.5rem; cursor: pointer; color: white; position: absolute; top: 1rem; right: 1rem; }

    /* Overlay para celular */
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; }

    /* Área Principal */
    .main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; background: white; padding: 2rem 3rem; width: 100%; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); gap: 15px; }
    
    /* Botón Hamburguesa (Solo Móvil) */
    .menu-btn { display: none; background: none; border: none; font-size: 1.8rem; color: var(--text); cursor: pointer; }

    .toolbar { display: flex; justify-content: space-between; margin-bottom: 1.5rem; position: sticky; top: 0; background: white; z-index: 10; padding: 10px 0; gap: 10px; }
    .btn-create { background: var(--monday-blue); color: white; border: none; padding: 0.8rem 1.8rem; border-radius: 8px; font-weight: 800; cursor: pointer; box-shadow: 0 4px 6px rgba(0, 115, 234, 0.2); transition: 0.2s; white-space: nowrap; }
    .btn-create:hover { transform: translateY(-2px); }
    .select-filtro { padding: 0.7rem 1rem; border: 2px solid var(--border); border-radius: 8px; min-width: 250px; font-weight: 700; outline: none; }

    /* KPIs Rápidos */
    .kpi-container { display: flex; gap: 1.5rem; margin-bottom: 2rem; }
    .kpi-card { flex: 1; background: #F8FAFC; border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; display: flex; align-items: center; justify-content: space-between; }
    .kpi-card h3 { font-size: 0.85rem; color: #64748B; text-transform: uppercase; font-weight: 800; margin-bottom: 5px; }
    .kpi-card span { font-size: 2.5rem; font-weight: 800; color: #0F172A; line-height: 1; }
    
    @keyframes latido-rojo { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    .badge-vencido { background: #EF4444; color: white; padding: 6px 12px; border-radius: 6px; font-weight: 800; font-size: 0.75rem; animation: latido-rojo 1.5s infinite; display: inline-block; }

    /* Tabla con Scroll Responsivo */
    .table-wrapper { width: 100%; overflow-x: auto; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 2rem; -webkit-overflow-scrolling: touch; }
    .monday-table { width: 100%; border-collapse: collapse; table-layout: fixed; min-width: 1000px; /* Evita que se aplaste en móvil */ }
    .monday-table th { padding: 1rem; background: #F8FAFC; font-size: 0.75rem; color: #64748B; text-transform: uppercase; font-weight: 800; border-bottom: 1px solid var(--border); text-align: center; }
    .monday-table td { height: 75px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); text-align: center; font-size: 0.9rem; padding: 0; background: white; }
    
    .cell-task { text-align: left !important; padding: 0.5rem 1.5rem !important; border-left: 6px solid var(--monday-blue); width: 350px; }
    .task-title { font-weight: 800; font-size: 0.95rem; color: #0F172A; }
    .task-desc { font-size: 0.8rem; color: #64748B; margin-top: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    
    .tarea-completada .task-title { text-decoration: line-through; color: #94A3B8; }
    .tarea-completada .task-desc { text-decoration: line-through; color: #CBD5E1; }
    
    .monday-select { appearance: none; width: 100%; height: 100%; border: none; color: white; font-weight: 800; text-align: center; cursor: pointer; outline: none; }

    /* Gráficas */
    .dashboard-view { display: none; grid-template-columns: 1fr 1fr; gap: 2rem; }
    .chart-card { background: white; padding: 2rem; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }

    /* Modal Responsivo */
    .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); display: none; place-items: center; z-index: 1100; backdrop-filter: blur(4px); padding: 1rem; }
    .modal-overlay.active { display: flex; align-items: center; justify-content: center; }
    .modal { background: white; width: 100%; max-width: 650px; border-radius: 16px; padding: 2rem; box-shadow: 0 25px 50px rgba(0,0,0,0.25); max-height: 95vh; overflow-y: auto; }
    .form-group { margin-bottom: 1.2rem; display: flex; flex-direction: column; gap: 6px; }
    .form-row { display: flex; gap: 1rem; }
    label { font-size: 0.8rem; font-weight: 800; color: #475569; text-transform: uppercase; }
    input, select, textarea { padding: 0.8rem; border: 2px solid var(--border); border-radius: 8px; font-size: 0.95rem; font-weight: 500; outline: none; width: 100%; }
    input:focus, select:focus, textarea:focus { border-color: var(--monday-blue); }
    textarea { height: 90px; resize: none; }

    .loader { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; font-weight: 800; font-size: 1.2rem; letter-spacing: 2px; color: var(--monday-blue); }
    .spinner { width: 50px; height: 50px; border: 5px solid #E2E8F0; border-top-color: var(--monday-blue); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px;}

    /* =========================================
       MEDIA QUERIES (MAGIA PARA CELULAR)
       ========================================= */
    @media (max-width: 768px) {
      .sidebar { position: fixed; top: 0; left: 0; bottom: 0; transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-close { display: block; }
      .sidebar-overlay.active { display: block; }
      
      .menu-btn { display: block; }
      .main { padding: 1rem; }
      
      .header { flex-wrap: wrap; }
      .header h1 { font-size: 1.5rem; }
      
      .toolbar { flex-direction: column; align-items: stretch; position: relative; }
      .btn-create, .select-filtro { width: 100%; }
      
      .kpi-container { flex-direction: column; gap: 1rem; }
      
      .dashboard-view { grid-template-columns: 1fr; }
      
      .form-row { flex-direction: column; gap: 0; }
      .modal { padding: 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMenu()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-close" onclick="toggleMenu()">✕</div>
    <div style="font-size: 1.8rem; font-weight: 800; margin-bottom: 3rem; color: white;">FI WorkOS</div>
    <div class="nav-item active" id="nav-tab" onclick="toggleView('tabla'); toggleMenu();">📋 Panel Operativo</div>
    <div class="nav-item" id="nav-chart" onclick="toggleView('graficas'); toggleMenu();">📊 Analíticas de Riesgo</div>
  </aside>

  <div class="loader" id="loader"><div class="spinner"></div><span id="loader-text">SINCRONIZANDO...</span></div>

  <main class="main">
    <div class="header">
      <div style="display: flex; align-items: center; gap: 10px;">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <h1 style="font-weight: 800;">Control Corporativo</h1>
      </div>
      <div style="background: #1E293B; color: white; padding: 8px 15px; border-radius: 50px; font-size: 0.75rem; font-weight: 800;">PERFIL: DIRECCIÓN</div>
    </div>

    <div class="toolbar">
      <button class="btn-create" onclick="abrirModal()">+ NUEVA ACTIVIDAD</button>
      <select id="filtroDepto" class="select-filtro" onchange="aplicarFiltro()">
        <option value="Todos">Todas las Áreas</option>
        <option value="Mantenimiento">Mantenimiento</option>
        <option value="Jurídico">Jurídico</option>
        <option value="Ama de llaves">Ama de llaves</option>
        <option value="Sistemas">Sistemas</option>
        <option value="Operaciones">Operaciones</option>
        <option value="Finanzas">Finanzas</option>
        <option value="Compras">Compras</option>
      </select>
    </div>

    <div id="view-tabla">
      <div class="kpi-container">
        <div class="kpi-card">
          <div><h3>Activas</h3><span id="kpi-activas">0</span></div>
          <div style="font-size: 2rem;">📋</div>
        </div>
        <div class="kpi-card" style="border-left: 5px solid #EF4444; background: #FEF2F2;">
          <div><h3 style="color: #EF4444;">Vencidas</h3><span id="kpi-vencidas" style="color: #EF4444;">0</span></div>
          <div style="font-size: 2rem;">🚨</div>
        </div>
        <div class="kpi-card" style="border-left: 5px solid #00C875;">
          <div><h3>Completadas</h3><span id="kpi-listas" style="color: #00C875;">0</span></div>
          <div style="font-size: 2rem;">✅</div>
        </div>
      </div>

      <div class="table-wrapper">
        <table class="monday-table">
          <thead>
            <tr>
              <th style="width:40px;"></th>
              <th>Requerimiento y Detalles</th>
              <th style="width:150px;">Asignado A</th>
              <th style="width:140px;">Estatus</th>
              <th style="width:130px;">Prioridad</th>
              <th style="width:110px;">Inicio</th>
              <th style="width:130px;">Vencimiento</th>
            </tr>
          </thead>
          <tbody id="tabla-body"></tbody>
        </table>
      </div>
    </div>

    <div class="dashboard-view" id="view-graficas">
      <div class="chart-card"><h3 style="margin-bottom:1.5rem; font-weight:800;">Avance Global</h3><div style="height:300px;"><canvas id="statusChart"></canvas></div></div>
      <div class="chart-card"><h3 style="margin-bottom:1.5rem; font-weight:800;">Demanda por Área</h3><div style="height:300px;"><canvas id="deptChart"></canvas></div></div>
    </div>
  </main>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h2 style="margin-bottom: 2rem; font-weight: 800; font-size: 1.5rem;">Alta de Actividad</h2>
      <form id="taskForm" onsubmit="guardarDatos(event)">
        <div class="form-group"><label>Tarea</label><input type="text" id="f_tarea" required placeholder="Ej. Revisión de protocolos"></div>
        <div class="form-group"><label>Descripción / Notas</label><textarea id="f_desc" required placeholder="Escribe los detalles aquí..."></textarea></div>
        
        <div class="form-row">
          <div class="form-group" style="flex: 1;"><label>Departamento</label>
            <select id="f_depto">
              <option value="Mantenimiento">Mantenimiento</option>
              <option value="Jurídico">Jurídico</option>
              <option value="Ama de llaves">Ama de llaves</option>
              <option value="Sistemas">Sistemas</option>
              <option value="Operaciones">Operaciones</option>
              <option value="Finanzas">Finanzas</option>
              <option value="Compras">Compras</option>
            </select>
          </div>
          <div class="form-group" style="flex: 1;"><label>Prioridad</label>
            <select id="f_prio"><option value="Baja">Baja</option><option value="Media">Media</option><option value="Alta">Alta</option><option value="Crítica">Crítica</option></select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group" style="flex: 1;"><label>Fecha de Inicio</label><input type="date" id="f_inicio" required></div>
          <div class="form-group" style="flex: 1;"><label>Fecha Límite</label><input type="date" id="f_fin" required></div>
        </div>

        <div class="form-group"><label>Persona Asignada</label><input type="text" id="f_resp" required placeholder="Ej. Ing. López"></div>
        
        <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
          <button type="button" style="flex: 1; padding: 1rem; border-radius:8px; border:2px solid #E2E8F0; background:white; font-weight:800; cursor:pointer;" onclick="cerrarModal()">CANCELAR</button>
          <button type="submit" class="btn-create" style="flex: 1.5;">GUARDAR TAREA</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // 🚨 PON AQUÍ TU URL (LA QUE NO TIENE ERRORES) 🚨
    const API_URL = "https://script.google.com/macros/s/AKfycbz6ZsrQM-kjuFHcPkrO5TkrAo2U54WX8csFyRvZG62vAlM8G8c5M800zMU2gs-X8VYiiA/exec";
    
    let baseDatos = [];
    let ch1, ch2;

    document.addEventListener('DOMContentLoaded', iniciarCarga);

    // Menú Celular
    function toggleMenu() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      if (window.innerWidth <= 768) {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('active');
      }
    }

    function mostrarCarga(mostrar, texto="PROCESANDO") {
      document.getElementById('loader-text').innerText = texto;
      document.getElementById('loader').style.display = mostrar ? 'flex' : 'none';
    }

    async function iniciarCarga() {
      mostrarCarga(true, "CONECTANDO...");
      try {
        const res = await fetch(API_URL);
        const json = await res.json();
        if (json.exito) {
          baseDatos = json.datos;
          aplicarFiltro();
        }
      } catch(e) { console.error("Error al cargar"); }
      mostrarCarga(false);
    }

    function aplicarFiltro() {
      const d = document.getElementById('filtroDepto').value;
      renderizarTabla(d === 'Todos' ? baseDatos : baseDatos.filter(x => x.departamento === d));
    }

    function renderizarTabla(arr) {
      const body = document.getElementById('tabla-body');
      body.innerHTML = '';
      
      let countActivas = 0; let countVencidas = 0; let countListas = 0;
      const hoy = new Date(); hoy.setHours(0,0,0,0);
      
      arr.forEach(d => {
        const cStat = d.estatus==='Listo'?'var(--stat-listo)':(d.estatus==='En curso'?'var(--stat-curso)':(d.estatus==='Estancado'?'var(--stat-estancado)':'var(--stat-gris)'));
        const cPrio = d.prioridad==='Crítica'?'#0F172A':(d.prioridad==='Alta'?'var(--prio-alta)':(d.prioridad==='Media'?'var(--prio-media)':'var(--prio-baja)'));
        
        let fechaFinVisual = `<span style="color:#0F172A; font-weight:800;">${d.fechaFin}</span>`;
        let claseCompletada = d.estatus === 'Listo' ? "tarea-completada" : "";

        if (d.estatus === 'Listo') {
            countListas++;
            fechaFinVisual = `<span style="color:#94A3B8;">${d.fechaFin}</span>`;
        } else {
            countActivas++;
            if (d.fechaFin) {
                const partes = d.fechaFin.split('-');
                if(partes.length === 3) {
                    const fechaObj = new Date(partes[0], partes[1] - 1, partes[2]);
                    if (fechaObj < hoy) {
                        countVencidas++;
                        fechaFinVisual = `<div class="badge-vencido">⚠️ VENCIDO<br>${d.fechaFin}</div>`;
                    }
                }
            }
        }

        body.innerHTML += `
          <tr class="${claseCompletada}">
            <td style="background: #F8FAFC;"></td>
            <td class="cell-task" style="${d.estatus === 'Listo' ? 'border-left-color: #00C875;' : ''}">
              <div class="task-title">${d.tarea}</div>
              <div class="task-desc">${d.descripcion}</div>
            </td>
            <td><span style="font-weight:800; font-size:0.85rem;">${d.responsable}</span></td>
            <td style="background:${cStat};">
              <select class="monday-select" onchange="patch('${d.id}','Estatus',this.value)" style="background:transparent; color:${cStat==='var(--stat-gris)'?'#1E293B':'#FFF'}">
                <option style="color:black" value="Por hacer" ${d.estatus==='Por hacer'?'selected':''}>Por hacer</option>
                <option style="color:black" value="En curso" ${d.estatus==='En curso'?'selected':''}>En curso</option>
                <option style="color:black" value="Estancado" ${d.estatus==='Estancado'?'selected':''}>Estancado</option>
                <option style="color:black" value="Listo" ${d.estatus==='Listo'?'selected':''}>Listo</option>
              </select>
            </td>
            <td style="background:${cPrio};">
              <select class="monday-select" onchange="patch('${d.id}','Prioridad',this.value)" style="background:transparent; color:#FFF">
                <option style="color:black" value="Baja" ${d.prioridad==='Baja'?'selected':''}>Baja</option>
                <option style="color:black" value="Media" ${d.prioridad==='Media'?'selected':''}>Media</option>
                <option style="color:black" value="Alta" ${d.prioridad==='Alta'?'selected':''}>Alta</option>
                <option style="color:black" value="Crítica" ${d.prioridad==='Crítica'?'selected':''}>Crítica</option>
              </select>
            </td>
            <td style="color:#64748B; font-weight:700; font-size:0.8rem;">${d.fechaInicio}</td>
            <td>${fechaFinVisual}</td>
          </tr>`;
      });

      document.getElementById('kpi-activas').innerText = countActivas;
      document.getElementById('kpi-vencidas').innerText = countVencidas;
      document.getElementById('kpi-listas').innerText = countListas;
    }

    async function guardarDatos(e) {
      e.preventDefault();
      
      const payload = {
        tarea: document.getElementById('f_tarea').value,
        descripcion: document.getElementById('f_desc').value,
        departamento: document.getElementById('f_depto').value,
        prioridad: document.getElementById('f_prio').value,
        fechaInicio: document.getElementById('f_inicio').value,
        fechaFin: document.getElementById('f_fin').value,
        responsable: document.getElementById('f_resp').value
      };

      cerrarModal();
      mostrarCarga(true, "GUARDANDO...");

      try {
        await fetch(API_URL, { 
          method: 'POST', 
          headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
          body: JSON.stringify({accion: "crear", item: payload}) 
        });
        setTimeout(iniciarCarga, 1000);
      } catch(error) {
        alert("Fallo de red.");
        mostrarCarga(false);
      }
    }

    async function patch(id, campo, valor) {
      mostrarCarga(true, "ACTUALIZANDO...");
      try {
        await fetch(API_URL, { 
          method: 'POST', 
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({accion: "actualizar", id: id, campo: campo, valor: valor}) 
        });
        setTimeout(iniciarCarga, 800);
      } catch(e) { mostrarCarga(false); }
    }

    function renderCharts() {
      const st = { listo:0, curso:0, estancado:0, hacer:0 };
      const dp = {};
      baseDatos.forEach(d => {
        if(d.estatus==='Listo') st.listo++; else if(d.estatus==='En curso') st.curso++; else if(d.estatus==='Estancado') st.estancado++; else st.hacer++;
        dp[d.departamento] = (dp[d.departamento] || 0) + 1;
      });

      if(ch1) ch1.destroy();
      ch1 = new Chart(document.getElementById('statusChart'), {
        type: 'doughnut',
        data: { labels: ['Completado', 'En Ejecución', 'Detenido', 'Pendiente'], datasets: [{ data: [st.listo, st.curso, st.estancado, st.hacer], backgroundColor: ['#00C875','#FDAB3D','#E2445C','#94A3B8'], borderWidth: 0 }] },
        options: { maintainAspectRatio: false, cutout: '80%', plugins: { legend: { position: 'right' } } }
      });

      if(ch2) ch2.destroy();
      ch2 = new Chart(document.getElementById('deptChart'), {
        type: 'bar',
        data: { labels: Object.keys(dp), datasets: [{ label: 'Volumen', data: Object.values(dp), backgroundColor: '#0073EA', borderRadius: 8 }] },
        options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true, grid: { display: false } }, x: { grid: { display: false } } }, plugins: { legend: { display: false } } }
      });
    }

    function toggleView(v) {
      document.getElementById('nav-tab').classList.toggle('active', v==='tabla');
      document.getElementById('nav-chart').classList.toggle('active', v==='graficas');
      document.getElementById('view-tabla').style.display = v==='tabla'?'block':'none';
      document.getElementById('view-graficas').style.display = v==='graficas'?'grid':'none';
      if(v==='graficas') setTimeout(renderCharts, 100);
    }
    
    function abrirModal() { document.getElementById('modal').classList.add('active'); }
    function cerrarModal() { document.getElementById('modal').classList.remove('active'); document.getElementById('taskForm').reset(); }
  </script>
</body>
</html>
