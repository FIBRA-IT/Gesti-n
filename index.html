<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corporate Hub | Fibra Inn</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg-board: #FFFFFF; --text-main: #323338; --text-gray: #676879;
      --border-color: #D0D4E4; --border-light: #E6E9EF;
      --monday-blue: #0073EA; --sidebar-bg: #1A1F36;
      --stat-listo: #00C875; --stat-curso: #FDAB3D; --stat-estancado: #E2445C; --stat-gris: #C4C4C4;
      --prio-critica: #333333; --prio-alta: #E2445C; --prio-media: #A25DDC; --prio-baja: #579BFC;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; }
    body { display: flex; height: 100vh; background-color: var(--bg-board); color: var(--text-main); overflow: hidden; }
    
    /* Sidebar */
    .panel-secundario { width: 260px; background: #F7F8FA; border-right: 1px solid var(--border-color); padding: 2rem 1.2rem; display: flex; flex-direction: column; }
    .panel-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 2.5rem; display: flex; align-items: center; gap: 10px; }
    .nav-item { padding: 0.8rem 1rem; border-radius: 8px; font-size: 0.95rem; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s; margin-bottom: 0.5rem; }
    .nav-item.active { background: #E4F1FF; color: var(--monday-blue); font-weight: 700; border-left: 4px solid var(--monday-blue); }
    .nav-item:hover:not(.active) { background: #EAECEF; }

    /* Main Area */
    .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 2rem 3rem; }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid var(--border-light); padding-bottom: 1rem; }
    
    /* Toolbar */
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; position: sticky; top: 0; background: white; z-index: 5; padding: 10px 0; }
    .btn-monday { background: var(--monday-blue); color: white; border: none; padding: 0.7rem 1.5rem; border-radius: 4px; font-weight: 500; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(0, 115, 234, 0.2); }
    .btn-monday:hover { background: var(--monday-hover); transform: translateY(-1px); }
    .select-filtro { padding: 0.6rem; border: 1px solid var(--border-color); border-radius: 4px; outline: none; min-width: 200px; font-weight: 500; }

    /* Tabla Estilo Monday */
    .monday-group { margin-bottom: 2rem; border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; }
    .group-header { padding: 0.8rem 1.2rem; font-size: 1.1rem; font-weight: 500; color: var(--monday-blue); background: white; border-bottom: 1px solid var(--border-color); }
    .monday-table { width: 100%; border-collapse: collapse; table-layout: fixed; background: white; }
    .monday-table th { padding: 0.8rem; border-bottom: 1px solid var(--border-color); border-right: 1px solid var(--border-light); font-weight: 500; color: var(--text-gray); font-size: 0.85rem; text-align: center; background: #FAFBFC; }
    .monday-table td { border-bottom: 1px solid var(--border-light); border-right: 1px solid var(--border-light); text-align: center; font-size: 0.9rem; height: 55px; padding: 0; }
    
    /* Celda de Tarea con Descripción (Imagen Monday) */
    .cell-tarea { text-align: left !important; padding: 0.5rem 1rem !important; border-left: 6px solid var(--monday-blue); }
    .tarea-titulo { font-weight: 500; color: var(--text-main); font-size: 0.95rem; }
    .tarea-desc { font-size: 0.75rem; color: var(--text-gray); margin-top: 2px; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis; }
    
    .monday-select { appearance: none; -webkit-appearance: none; width: 100%; height: 100%; border: none; color: white; font-weight: 500; text-align: center; text-align-last: center; cursor: pointer; outline: none; }
    .monday-select:hover { filter: brightness(0.9); }

    /* Analíticas Premium */
    .dashboard-view { display: none; grid-template-columns: 1fr 2fr; gap: 1.5rem; height: 450px; padding-top: 1rem; }
    .chart-box { background: white; padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border-color); display: flex; flex-direction: column; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
    .chart-title { font-size: 1.1rem; font-weight: 500; margin-bottom: 1.5rem; color: var(--text-main); font-family: 'Roboto', sans-serif; }
    .canvas-container { flex: 1; position: relative; width: 100%; height: 100%; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; place-items: center; z-index: 100; backdrop-filter: blur(2px); }
    .modal-overlay.active { display: grid; }
    .modal { background: white; width: 100%; max-width: 550px; border-radius: 12px; padding: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    .form-group { margin-bottom: 1.2rem; display: flex; flex-direction: column; gap: 0.4rem; }
    label { font-size: 0.85rem; font-weight: 600; color: var(--text-main); }
    input, select, textarea { padding: 0.8rem; border: 1px solid var(--border-color); border-radius: 6px; font-size: 0.95rem; outline: none; }
    textarea { resize: vertical; min-height: 80px; }

    .loader-wrap { position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 200; display: none; justify-content: center; align-items: center; flex-direction: column; gap: 10px; }
    .spinner { width: 40px; height: 40px; border: 4px solid var(--border-light); border-top-color: var(--monday-blue); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <aside class="panel-secundario">
    <div class="panel-title">Fibra Inn WorkOS</div>
    <div class="nav-item active" id="nav-tablero" onclick="cambiarVista('tabla')">📋 Tablero de Ejecución</div>
    <div class="nav-item" id="nav-graficas" onclick="cambiarVista('graficas')">📈 Analíticas y Reportes</div>
  </aside>

  <div class="loader-wrap" id="loader"><div class="spinner"></div><div id="loader-text" style="font-weight: 500;">Sincronizando...</div></div>

  <main class="main-wrapper">
    <div class="header-top">
      <h1 class="board-title">Requerimientos Corporativoshampton</h1>
      <div style="background: #E2E8F0; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: 700;">SESIÓN: CORPORATIVO</div>
    </div>

    <div class="toolbar">
      <div class="tools-left">
        <button class="btn-monday" onclick="abrirModal()">+ Nuevo Requerimiento</button>
        <select id="filtroDepto" class="select-filtro" onchange="aplicarFiltro()">
          <option value="Todos">Filtrar por Área: Todas</option>
          <option value="Mantenimiento">Mantenimiento</option>
          <option value="Jurídico">Jurídico</option>
          <option value="Ama de llaves">Ama de llaves</option>
          <option value="Sistemas">Sistemas</option>
          <option value="Compras">Compras</option>
        </select>
      </div>
    </div>

    <div id="vista-tabla">
      <div class="monday-group">
        <div class="group-header">▼ Activos</div>
        <table class="monday-table"><tbody id="body-activos"></tbody></table>
      </div>
      <div class="monday-group">
        <div class="group-header" style="color: var(--stat-listo);">▼ Completados</div>
        <table class="monday-table" style="border-left: 6px solid var(--stat-listo);"><tbody id="body-resueltos"></tbody></table>
      </div>
    </div>

    <div class="dashboard-view" id="vista-graficas">
      <div class="chart-box">
        <div class="chart-title">Estatus Global de Operaciones</div>
        <div class="canvas-container"><canvas id="statusChart"></canvas></div>
      </div>
      <div class="chart-box">
        <div class="chart-title">Distribución de Carga por Área</div>
        <div class="canvas-container"><canvas id="deptChart"></canvas></div>
      </div>
    </div>
  </main>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h2 style="font-size: 1.4rem; font-weight: 700;">Registrar Requerimiento</h2>
        <button onclick="cerrarModal()" style="background: none; border: none; font-size: 1.8rem; cursor: pointer; color: var(--text-gray);">&times;</button>
      </div>
      <form id="formTicket" onsubmit="guardarTicket(event)">
        <div class="form-group"><label>Tarea / Asunto</label><input type="text" id="inpAsunto" required></div>
        <div class="form-group"><label>Descripción Detallada</label><textarea id="inpDesc" required placeholder="Explica los detalles aquí..."></textarea></div>
        <div style="display: flex; gap: 1rem;">
          <div class="form-group" style="flex: 1;"><label>Área</label>
            <select id="inpDepto" required>
              <option value="Mantenimiento" selected>Mantenimiento</option>
              <option value="Jurídico">Jurídico</option>
              <option value="Ama de llaves">Ama de llaves</option>
              <option value="Sistemas">Sistemas</option>
              <option value="Compras">Compras</option>
            </select>
          </div>
          <div class="form-group" style="flex: 1;"><label>Prioridad</label>
            <select id="inpPrio" required><option value="Baja">Baja</option><option value="Media">Media</option><option value="Alta">Alta</option><option value="Crítica">Crítica</option></select>
          </div>
        </div>
        <div class="form-group"><label>Asignar a (Texto Libre)</label><input type="text" id="inpResp" required placeholder="Ej. Juan Pérez / Jefe de Área"></div>
        <div style="display: flex; gap: 10px; margin-top: 1rem;">
          <button type="button" style="flex:1; padding: 0.8rem; cursor:pointer;" onclick="cerrarModal()">Cancelar</button>
          <button type="submit" class="btn-monday" style="flex:2;">Crear Tarea</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzDOlrGBX2SwWISncNGzsQ8BKcLpIkXYM9Ytdk51ecJg7R9HxJvoYeebKB6mIeOLuSb/exec";
    let datosGlobales = [];
    let chartEstatus, chartDepto;

    document.addEventListener('DOMContentLoaded', cargarDatos);

    function cambiarVista(vista) {
      document.getElementById('nav-tablero').classList.remove('active');
      document.getElementById('nav-graficas').classList.remove('active');
      if(vista === 'tabla') {
        document.getElementById('nav-tablero').classList.add('active');
        document.getElementById('vista-tabla').style.display = 'block';
        document.getElementById('vista-graficas').style.display = 'none';
      } else {
        document.getElementById('nav-graficas').classList.add('active');
        document.getElementById('vista-tabla').style.display = 'none';
        document.getElementById('vista-graficas').style.display = 'grid';
        actualizarGraficas(datosGlobales);
      }
    }

    function abrirModal() { document.getElementById('modal').classList.add('active'); }
    function cerrarModal() { document.getElementById('modal').classList.remove('active'); document.getElementById('formTicket').reset(); }
    function mostrarCarga(mostrar, texto="Sincronizando...") { 
      document.getElementById('loader-text').innerText = texto;
      document.getElementById('loader').style.display = mostrar ? 'flex' : 'none'; 
    }

    async function cargarDatos() {
      mostrarCarga(true, "Conectando al servidor...");
      try {
        const res = await fetch(API_URL);
        const json = await res.json();
        if(json.exito) { datosGlobales = json.datos; aplicarFiltro(); }
      } catch (e) { console.error(e); }
      mostrarCarga(false);
    }

    function aplicarFiltro() {
      const depto = document.getElementById('filtroDepto').value;
      const filtrados = depto === 'Todos' ? datosGlobales : datosGlobales.filter(d => d.departamento === depto);
      dibujarTabla(filtrados);
    }

    function getColorStatus(s) { return s==='Listo'?'var(--stat-listo)':(s==='En curso'?'var(--stat-curso)':(s==='Estancado'?'var(--stat-estancado)':'var(--stat-gris)')); }
    function getColorPrio(p) { return p==='Crítica'?'var(--prio-critica)':(p==='Alta'?'var(--prio-alta)':(p==='Media'?'var(--prio-media)':'var(--prio-baja)')); }

    function dibujarTabla(datos) {
      const bodyActivos = document.getElementById('body-activos');
      const bodyResueltos = document.getElementById('body-resueltos');
      bodyActivos.innerHTML = ''; bodyResueltos.innerHTML = '';
      
      datos.forEach(d => {
        const bgStat = getColorStatus(d.estatus);
        const bgPrio = getColorPrio(d.prioridad);
        const inicial = d.responsable ? d.responsable.charAt(0).toUpperCase() : '?';
        
        const filaHtml = `
          <tr>
            <td style="width:40px; background: #F5F6F8;"><input type="checkbox" disabled></td>
            <td class="cell-tarea">
              <div class="tarea-titulo">${d.tarea}</div>
              <div class="tarea-desc" title="${d.descripcion || ''}">${d.descripcion || 'Sin descripción adicional'}</div>
            </td>
            <td style="width:140px;">
              <div style="display: flex; align-items: center; justify-content: center; gap: 6px;">
                <div style="width:24px; height:24px; background:#0073EA; color:white; border-radius:50%; display:grid; place-items:center; font-size:0.75rem; font-weight:bold;">${inicial}</div>
                <span style="font-size:0.8rem;">${d.responsable}</span>
              </div>
            </td>
            <td style="width:160px; color: var(--text-gray); font-size: 0.8rem; font-weight: 500;">${d.departamento}</td>
            <td style="width:140px; background-color: ${bgStat};">
              <select class="monday-select" style="background: transparent; color: ${bgStat==='var(--stat-gris)'?'#333':'#fff'};" onchange="actualizarDato('${d.id}', 'Estatus', this.value)">
                <option value="Por hacer" ${d.estatus==='Por hacer'?'selected':''}>Por hacer</option>
                <option value="En curso" ${d.estatus==='En curso'?'selected':''}>En curso</option>
                <option value="Estancado" ${d.estatus==='Estancado'?'selected':''}>Estancado</option>
                <option value="Listo" ${d.estatus==='Listo'?'selected':''}>Listo</option>
              </select>
            </td>
            <td style="width:140px; background-color: ${bgPrio};">
              <select class="monday-select" style="background: transparent;" onchange="actualizarDato('${d.id}', 'Prioridad', this.value)">
                <option value="Baja" ${d.prioridad==='Baja'?'selected':''}>Baja</option>
                <option value="Media" ${d.prioridad==='Media'?'selected':''}>Media</option>
                <option value="Alta" ${d.prioridad==='Alta'?'selected':''}>Alta</option>
                <option value="Crítica" ${d.prioridad==='Crítica'?'selected':''}>Crítica</option>
              </select>
            </td>
            <td style="width:100px; font-size: 0.8rem; color: var(--text-gray); font-weight: 500;">${d.fecha}</td>
          </tr>
        `;
        if(d.estatus === 'Listo') bodyResueltos.innerHTML += filaHtml;
        else bodyActivos.innerHTML += filaHtml;
      });
    }

    async function guardarTicket(e) {
      e.preventDefault();
      cerrarModal();
      mostrarCarga(true, "Registrando en la nube...");
      
      const payload = {
        accion: "crear",
        item: {
          tarea: document.getElementById('inpAsunto').value,
          descripcion: document.getElementById('inpDesc').value, // ¡AHORA SÍ SE ENVÍA LA DESCRIPCIÓN!
          departamento: document.getElementById('inpDepto').value,
          prioridad: document.getElementById('inpPrio').value,
          responsable: document.getElementById('inpResp').value
        }
      };

      try {
        await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) });
        setTimeout(cargarDatos, 1000);
      } catch(e) { alert("Error."); mostrarCarga(false); }
    }

    async function actualizarDato(id, campo, valor) {
      mostrarCarga(true, "Actualizando cambios...");
      try {
        await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({accion: "actualizar", id: id, campo: campo, valor: valor}) });
        setTimeout(cargarDatos, 1000);
      } catch(e) { alert("Error."); mostrarCarga(false); }
    }

    // Configuración Premium de Gráficas
    function actualizarGraficas(datos) {
      let hacer = 0, curso = 0, estancado = 0, listo = 0;
      let deptos = { "Mantenimiento":0, "Jurídico":0, "Ama de llaves":0, "Sistemas":0, "Compras":0 };
      datos.forEach(d => {
        if(d.estatus==='Listo') listo++; else if(d.estatus==='En curso') curso++; else if(d.estatus==='Estancado') estancado++; else hacer++;
        if(deptos[d.departamento]!==undefined) deptos[d.departamento]++;
      });

      Chart.defaults.font.family = "'Roboto', sans-serif";
      
      const ctxStat = document.getElementById('statusChart').getContext('2d');
      if(chartEstatus) chartEstatus.destroy();
      chartEstatus = new Chart(ctxStat, { 
        type: 'doughnut', 
        data: { labels: ['Por hacer', 'En curso', 'Estancado', 'Listo'], datasets: [{ data: [hacer, curso, estancado, listo], backgroundColor: ['#C4C4C4', '#FDAB3D', '#E2445C', '#00C875'], borderWidth: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { position: 'right', labels: { boxWidth: 15, padding: 15 } } } }
      });

      const ctxDept = document.getElementById('deptChart').getContext('2d');
      if(chartDepto) chartDepto.destroy();
      chartDepto = new Chart(ctxDept, { 
        type: 'bar', 
        data: { labels: Object.keys(deptos), datasets: [{ label: 'Tareas Activas', data: Object.values(deptos), backgroundColor: '#0073EA', borderRadius: 6 }] }, 
        options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, grid: { display: false }, ticks: { stepSize: 1 } }, x: { grid: { display: false } } }, plugins: { legend: { display: false } } }
      });
    }
  </script>
</body>
</html>
